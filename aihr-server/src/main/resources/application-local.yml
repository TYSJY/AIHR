# 本地预览配置：无需单独安装 PostgreSQL / Redis
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - cn.dev33.satoken.dao.SaTokenDaoRedisJackson

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/aihr-local;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    hikari:
      minimum-idle: 1
      maximum-pool-size: 5
      connection-timeout: 30000

  sql:
    init:
      mode: always
      schema-locations: classpath:db/init.sql
      data-locations: classpath:db/local-data.sql
      continue-on-error: true

file:
  storage-type: local
  local:
    base-path: ./uploads
    url-prefix: /api/files
    allowed-types: pdf,doc,docx,jpg,jpeg,png,gif,xlsx,xls
    max-file-size: 50

logging:
  level:
    com.aihr: INFO
    org.springframework.web: INFO
    org.springframework.jdbc.datasource.init: WARN
